<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS DOM</title>
</head>
<body>

    <div id="helloText">Hello DOM</div>

    <input id="firstname" name="first" value="ทดสอบ">

    <div>
        <div id="main">
            <div id="mainContent">
                <i>example</i>
            </div>
        </div>
    </div>

    <h1>สิ่งที่สนใจ</h1>

    <div id="showName"></div>

    <div>
        <input type="checkbox" name="interest" value="หนังสือ"> หนังสือ
        <input type="checkbox" name="interest" value="กีฟา"> กีฟา
        <input type="checkbox" name="interest" value="เกม"> เกม
    </div>
      <br>

    <button onclick="submitInterests()">สิ่งหน้าสนใจ</button>

    <br><br>

    <br>

    <button id="btnClick" onclick="buttonClick()">คลิก</button>

    <br><br>

    <button id="btnSubmit" onclick="submitInterests()">ส่งข้อมูล</button>

    <br><br>

    <div onmouseover="overItem()" onmouseup="upItem()">ลากเมาผ่าน</div>

    <div id="hello">
        Hello<span style="display: none;">Mai</span>
    </div>

    <div id="content"></div>

    <script>
        console.log("Hello");

        let helloText = document.getElementById("helloText");
        helloText.style.color = "blue";

        let firstnameDOM = document.getElementById("firstname");
        console.log(firstnameDOM.value);
        document.getElementById("showName").innerHTML = "ชื่อ: " + firstnameDOM.value;
        let hobby = document.getElementsByName("interest");
        let html = "<ul>";
        for (let i = 0; i < hobby.length; i++) {
            html += "<li>" + hobby[i].value + "</li>";
        }
        html += "</ul>";
        document.getElementById("content").innerHTML = html;

        function buttonClick() {
            console.log("คลิกแล้ว");
            let btn = document.getElementById("btnClick");
            btn.setAttribute("disabled", true);
            btn.style.backgroundColor = "red";
        }

        function submitInterests() {
            let interestDOM = document.querySelectorAll('input[name="interest"]');
            let content = "<ul>";
            for (let i = 0; i < interestDOM.length; i++) {
                if (interestDOM[i].checked) {
                    console.log(interestDOM[i].value);
                    content += "<li>" + interestDOM[i].value + "</li>";
                }
            }
            content += "</ul>";
            let contentDOM = document.getElementById("content");
            contentDOM.innerHTML = content;
        }
        function overItem() {
            console.log("เมาส์วางแล้ว");
        }
        function upItem() {
            console.log("ปล่อยเมาส์แล้ว");
        }
    </script>

</body>
</html>
